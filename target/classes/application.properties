# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=shoesdb;encrypt=true;trustServerCertificate=true;characterEncoding=UTF-8
spring.datasource.username=SA
spring.datasource.password=StrongPassw0rd!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# UTF-8 Configuration
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

